<!doctype html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>نظام الأرباح والعملاء</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">A</div>
        <div>
          <h1>نظام الأرباح</h1>
          <p>Clients • Profit • Accounts</p>
        </div>
      </div>

      <nav class="nav" id="nav">
        <button class="nav-item active" data-view="dashboard">لوحة التحكم</button>
        <button class="nav-item" data-view="clients">العملاء</button>
        <button class="nav-item" data-view="packages">الباقات</button>
        <button class="nav-item" data-view="videos">الفيديوهات</button>
        <button class="nav-item" data-view="invoices">الفواتير</button>
        <button class="nav-item" data-view="receipts">استلامات سريعة</button>
        <button class="nav-item" data-view="manualPayments">مدفوعات يدوية</button>
        <button class="nav-item" data-view="expenses">المصروفات</button>
        <button class="nav-item" data-view="accounts">الحسابات + 33%</button>
        <button class="nav-item" data-view="transfers">التحويلات</button>
        <button class="nav-item" data-view="printInvoice">طباعة فاتورة</button>
        <button class="nav-item" data-view="monthClose">داشبورد الشهور</button>
        <button class="nav-item" data-view="audit">فحص الأخطاء</button>
        <button class="nav-item" data-view="settings">إعدادات ونسخ احتياطي</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Arabic Web App</p>
          <h2 id="pageTitle">لوحة التحكم</h2>
        </div>
        <div class="top-actions">
          <button class="btn ghost" id="resetFiltersBtn">تحديث</button>
          <button class="btn secondary" id="cloudStatusBtn">مزامنة تلقائية</button>
          <button class="btn primary" id="quickReceiptBtn">+ استلام سريع</button>
        </div>
      </header>

      <section id="app" class="content"></section>
    </main>
  </div>

  <div class="modal hidden" id="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modalTitle">إضافة</h3>
        <button class="icon-btn" id="closeModal">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
